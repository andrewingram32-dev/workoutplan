<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="WorkoutPlan"/>
  <meta name="theme-color" content="#0a0a0f"/>
  <title>WorkoutPlan</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#0a0a0f;--surface:#12121a;--card:#1a1a26;--border:#2a2a3a;
      --push:#ff6b35;--pull:#4ecdc4;--legs:#a8e063;--cardio:#f7dc6f;
      --text:#f0f0f8;--muted:#6060a0;--accent:#ff6b35;
      --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100dvh;overflow-x:hidden}
    .top-bar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,10,15,.95);backdrop-filter:blur(20px);padding:calc(var(--safe-top) + 14px) 20px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
    .app-logo{font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:3px;color:var(--accent)}
    .top-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-align:right;line-height:1.5}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,10,15,.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bot)}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:color .15s}
    .nav-btn.active{color:var(--accent)}
    .nav-btn svg{width:20px;height:20px}
    .page{display:none;padding:90px 16px 90px;min-height:100dvh}
    .page.active{display:block}
    .sec-hdr{font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px;color:var(--muted);margin:20px 0 10px}
    .hero{background:linear-gradient(145deg,#1a1a28,#0f0f1a);border:1px solid var(--border);border-radius:20px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden}
    .hero::after{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:var(--sc,var(--accent));opacity:.06;pointer-events:none}
    .hero-badge{display:inline-flex;align-items:center;gap:6px;background:var(--sc,var(--accent));color:#000;font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:1px;padding:4px 12px;border-radius:20px;margin-bottom:10px}
    .hero-title{font-family:'Bebas Neue',cursive;font-size:40px;line-height:1;margin-bottom:4px}
    .hero-sub{font-size:12px;color:var(--muted)}
    .hero-pill{position:absolute;top:18px;right:18px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);border:1px solid var(--border);padding:3px 9px;border-radius:20px}
    .prog-row{display:flex;align-items:center;gap:14px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
    .ring-wrap{position:relative;width:52px;height:52px;flex-shrink:0}
    .ring-wrap svg{transform:rotate(-90deg)}
    .ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600}
    .prog-info strong{display:block;font-size:13px;margin-bottom:2px}
    .prog-info span{font-size:11px;color:var(--muted)}
    .start-btn{width:100%;background:var(--sc,var(--accent));color:#000;border:none;border-radius:12px;padding:14px;font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:2px;cursor:pointer;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px}
    .start-btn:active{opacity:.85}
    .banner{border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:12px;display:flex;align-items:center;gap:8px}
    .banner-cardio{background:#3d2f00;border:1px solid var(--cardio)}
    .banner-deload{background:#1a1a26;border:1px solid var(--border);color:#9090c0}
    .ex-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border-color .2s}
    .ex-card.logged{border-color:var(--sc,var(--accent))}
    .ex-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none}
    .ex-header:active{background:rgba(255,255,255,.02)}
    .ex-name{font-weight:600;font-size:14px;margin-bottom:3px}
    .ex-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
    .ex-tick{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all .2s}
    .ex-card.logged .ex-tick{border-color:var(--sc,var(--accent));background:var(--sc,var(--accent));color:#000}
    .set-tracker{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
    .ex-card.open .set-tracker{display:block}
    .field-labels{display:grid;grid-template-columns:28px 1fr 1fr 72px;gap:8px;margin:12px 0 6px}
    .field-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);text-align:center;letter-spacing:.5px;text-transform:uppercase}
    .sets-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
    .set-row{display:grid;grid-template-columns:28px 1fr 1fr 72px;gap:8px;align-items:center}
    .set-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);text-align:center}
    .set-field{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:16px;text-align:center;padding:10px 4px;width:100%;transition:border-color .2s}
    .set-field:focus{outline:none;border-color:var(--sc,var(--accent))}
    .set-field::placeholder{color:var(--border);font-size:12px}
    .set-log-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:1px;padding:10px 4px;cursor:pointer;width:100%;transition:all .2s;text-align:center}
    .set-log-btn.done{background:var(--sc,var(--accent));border-color:var(--sc,var(--accent));color:#000}
    .mark-done-btn{width:100%;background:var(--sc,var(--accent));color:#000;border:none;border-radius:10px;padding:12px;font-family:'Bebas Neue',cursive;font-size:15px;letter-spacing:1px;cursor:pointer}
    .mark-done-btn:active{opacity:.8}
    .week-block{margin-bottom:20px}
    .week-hdr{font-family:'Bebas Neue',cursive;font-size:15px;letter-spacing:2px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .ph-tag{font-size:9px;font-family:'DM Sans',sans-serif;padding:2px 7px;border-radius:10px;font-weight:600}
    .ph-1{background:#ff6b3520;color:var(--push)}.ph-2{background:#4ecdc420;color:var(--pull)}.ph-3{background:#a8e06320;color:var(--legs)}
    .sched-item{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px}
    .sched-item.now{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
    .sched-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);min-width:42px;text-align:center;line-height:1.6}
    .sched-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .sched-name{font-weight:600;font-size:13px}
    .sched-detail{font-size:11px;color:var(--muted);margin-top:1px}
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px}
    .stat-val{font-family:'Bebas Neue',cursive;font-size:34px;color:var(--accent)}
    .stat-label{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.5px;text-transform:uppercase}
    .pb-item{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
    .pb-name{font-weight:600;font-size:13px}
    .pb-detail{font-size:10px;color:var(--muted);margin-top:2px}
    .pb-val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:var(--accent)}
    .sett-section{margin-bottom:22px}
    .sett-card{background:var(--card);border:1px solid var(--border);border-radius:13px;overflow:hidden}
    .sett-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
    .sett-row:last-child{border-bottom:none}
    .sett-row-label{font-size:13px}
    .sett-row-val{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)}
    .toggle{width:42px;height:24px;background:var(--border);border-radius:12px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
    .toggle.on{background:var(--accent)}
    .toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s}
    .toggle.on::after{transform:translateX(18px)}
    .timer-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.95);backdrop-filter:blur(12px);flex-direction:column;align-items:center;justify-content:center}
    .timer-overlay.show{display:flex}
    .timer-num{font-family:'Bebas Neue',cursive;font-size:100px;color:var(--accent);line-height:1}
    .timer-lbl{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);margin-top:6px;margin-bottom:28px;letter-spacing:2px}
    .timer-skip{background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px 30px;border-radius:10px;font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:2px;cursor:pointer}
    .toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 18px;font-size:12px;font-weight:600;opacity:0;transition:all .25s;z-index:300;white-space:nowrap;pointer-events:none}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .empty{text-align:center;padding:48px 20px;color:var(--muted)}
    .empty-ico{font-size:44px;margin-bottom:12px}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .pulsing{animation:pulse 1s infinite}
  </style>
</head>
<body>
<div class="top-bar">

</div>
<div class="timer-overlay" id="timerOverlay">

const SK='wp_v2';
function mkDefault(){return{startDate:new Date().toISOString().split('T')[0],logs:{},settings:{unit:'kg'}};}
function loadD(){try{return JSON.parse(localStorage.getItem(SK))||mkDefault();}catch{return mkDefault();}}
function saveD(){localStorage.setItem(SK,JSON.stringify(D));}
let D=loadD();
function getSched(){
  const start=new Date(D.startDate+'T12:00:00');
  const cycle=['A','B','C'];
  const days=[];
  for(let wk=1;wk<=13;wk++){
    const ws=new Date(start);ws.setDate(start.getDate()+(wk-1)*7);
    [0,2,4].forEach((off,i)=>{
      const d=new Date(ws);d.setDate(ws.getDate()+off);
      days.push({date:d.toISOString().split('T')[0],week:wk,phase:wk<=4?1:wk<=9?2:3,session:cycle[i],isDeload:wk===5||wk===10});
    });
  }
  return days;
}
function todayStr(){return new Date().toISOString().split('T')[0];}
function fmtShort(s){return new Date(s+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});}
function fmtMed(s){return new Date(s+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
function getUnit(){return D.settings?.unit||'kg';}
function isLogged(dateStr){return Object.keys(D.logs).some(k=>k.startsWith(dateStr+'__')&&D.logs[k].done);}
function makeRing(pct,col){
  const r=20,c=2*Math.PI*r,dash=(pct/100)*c;
  return '<div class="ring-wrap"><svg width="52" height="52" viewBox="0 0 52 52"><circle cx="26" cy="26" r="'+r+'" fill="none" stroke="var(--border)" stroke-width="4"/><circle cx="26" cy="26" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="4" stroke-dasharray="'+dash+' '+c+'" stroke-linecap="round"/></svg><div class="ring-pct" style="color:'+col+'">'+pct+'%</div></div>';
}
function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(btn)btn.classList.add('active');
  if(name==='today')renderToday();
  if(name==='schedule')renderSchedule();
  if(name==='progress')renderProgress();
}
function renderToday(){
  const t=todayStr(),sched=getSched();
  const sess=sched.find(s=>s.date===t);
  const next=!sess?sched.find(s=>s.date>t):null;
  const done=sched.filter(s=>s.date<=t&&isLogged(s.date)).length;
  const pct=Math.round(done/sched.length*100);
  let html='';
  if(sess){
    const col=COLOURS[sess.session];
    const exList=EX[sess.session][sess.phase]||[];
    html+='<div class="hero" style="--sc:'+col+'"><div class="hero-badge">'+ICONS[sess.session]+' '+NAMES[sess.session]+'</div><div class="hero-title">'+NAMES[sess.session].toUpperCase()+'</div><div class="hero-sub">'+fmtShort(t)+' &middot; Phase '+sess.phase+' &middot; Week '+sess.week+'</div><div class="hero-pill">P'+sess.phase+' W'+sess.week+'</div><div class="prog-row">'+makeRing(pct,col)+'<div class="prog-info"><strong>'+done+' of '+sched.length+' sessions done</strong><span>'+(sched.length-done)+' remaining</span></div></div></div>';
    if(CARDIO_WEEKS.has(sess.week))html+='<div class="banner banner-cardio">&#x1F94A; <span><strong>Cardio week</strong> &mdash; Boxing / HIIT / Move class</span></div>';
    if(sess.isDeload)html+='<div class="banner banner-deload">&#x1F504; <strong>Deload week</strong> &mdash; Reduce all weights ~40%</div>';
    html+='<button class="start-btn" style="--sc:'+col+'" onclick="startWorkout()">&#9654; START WORKOUT</button>';
    html+='<div class="sec-hdr">'+exList.length+' Exercises Today</div>';
    exList.forEach((ex,i)=>{html+=buildExCard(ex,i,t,col,sess);});
  }else if(next){
    html+='<div class="hero"><div class="hero-badge">&#x1F634; Rest Day</div><div class="hero-title">REST &amp; RECOVER</div><div class="hero-sub">'+fmtShort(t)+'</div><div class="prog-row">'+makeRing(pct,'#555570')+'<div class="prog-info"><strong>'+done+' of '+sched.length+' sessions done</strong><span>'+(sched.length-done)+' remaining</span></div></div></div><div style="background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px;margin-top:10px"><div style="font-family:\'JetBrains Mono\',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:8px">NEXT SESSION</div><div style="font-weight:600;font-size:16px;margin-bottom:4px">'+ICONS[next.session]+' '+NAMES[next.session]+'</div><div style="font-size:12px;color:var(--muted)">'+fmtShort(next.date)+' &middot; Week '+next.week+' &middot; Phase '+next.phase+'</div></div>';
  }else{
    html='<div class="empty"><div class="empty-ico">&#x1F3C6;</div><div style="font-family:\'Bebas Neue\',cursive;font-size:28px">Programme Complete!</div><div style="font-size:13px;margin-top:8px">Incredible 13-week effort.</div></div>';
  }
  document.getElementById('todayContent').innerHTML=html;
}
function buildExCard(ex,idx,dateStr,col,sess){
  const sets=sess.isDeload?Math.max(2,ex.sets-1):ex.sets;
  const key=dateStr+'__'+ex.name;
  const exLog=D.logs[key]||{};
  const isDone=exLog.done===true;
  let rowsHtml='<div class="field-labels"><div class="field-label">#</div><div class="field-label">WT ('+getUnit()+')</div><div class="field-label">REPS</div><div class="field-label">LOG</div></div><div class="sets-grid">';
  for(let s=0;s<sets;s++){
    const sv=exLog['s'+s]||{};
    const setDone=sv.done===true;
    rowsHtml+='<div class="set-row"><div class="set-num">'+(s+1)+'</div><input class="set-field" type="number" inputmode="decimal" min="0" step="0.5" placeholder="0" value="'+(sv.w||'')+'" onchange="saveField(\''+key+'\','+s+',\'w\',this.value)" onfocus="this.select()"><input class="set-field" type="number" inputmode="numeric" min="0" placeholder="0" value="'+(sv.r||'')+'" onchange="saveField(\''+key+'\','+s+',\'r\',this.value)" onfocus="this.select()"><button class="set-log-btn '+(setDone?'done':'')+'" id="slb_'+idx+'_'+s+'" onclick="toggleSet(\''+key+'\','+idx+','+s+')">'+(setDone?'&#10003;':'LOG')+'</button></div>';
  }
  rowsHtml+='</div><button class="mark-done-btn" onclick="markDone(\''+key+'\',\''+ex.name+'\','+idx+',\''+col+'\')">&#10003; MARK EXERCISE COMPLETE</button>';
  const tickStyle=isDone?'background:'+col+';border-color:'+col+';color:#000':'';
  return '<div class="ex-card '+(isDone?'logged':'')+'" id="ec_'+idx+'" style="--sc:'+col+'"><div class="ex-header" onclick="toggleCard('+idx+')"><div><div class="ex-name">'+ex.name+'</div><div class="ex-meta">'+sets+' sets &middot; '+ex.reps+' reps &middot; '+ex.cue+'</div></div><div class="ex-tick" id="et_'+idx+'" style="'+tickStyle+'">'+(isDone?'&#10003;':'')+'</div></div><div class="set-tracker">'+rowsHtml+'</div></div>';
}
function toggleCard(idx){document.getElementById('ec_'+idx).classList.toggle('open');}
function saveField(key,setIdx,field,val){
  if(!D.logs[key])D.logs[key]={};
  if(!D.logs[key]['s'+setIdx])D.logs[key]['s'+setIdx]={};
  D.logs[key]['s'+setIdx][field]=val;
  saveD();
}
function toggleSet(key,cardIdx,setIdx){
  if(!D.logs[key])D.logs[key]={};
  if(!D.logs[key]['s'+setIdx])D.logs[key]['s'+setIdx]={};
  const wasD=D.logs[key]['s'+setIdx].done;
  D.logs[key]['s'+setIdx].done=!wasD;
  saveD();
  const btn=document.getElementById('slb_'+cardIdx+'_'+setIdx);
  if(btn){btn.classList.toggle('done',!wasD);btn.innerHTML=!wasD?'&#10003;':'LOG';}
  if(!wasD){showToast('Set '+(setIdx+1)+' logged &#10003;');startTimer();}
}
function markDone(key,exName,idx,col){
  if(!D.logs[key])D.logs[key]={};
  D.logs[key].done=true;saveD();
  const card=document.getElementById('ec_'+idx);
  card.classList.add('logged');card.classList.remove('open');
  const tick=document.getElementById('et_'+idx);
  if(tick){tick.innerHTML='&#10003;';tick.style.cssText='background:'+col+';border-color:'+col+';color:#000';}
  showToast(exName+' complete! &#x1F525;');
}
function startWorkout(){
  showToast('Workout started! &#x1F4AA;');
  const f=document.getElementById('ec_0');if(f){f.classList.add('open');f.scrollIntoView({behavior:'smooth',block:'center'});}
}
function renderSchedule(){
  const t=todayStr(),sched=getSched();
  const sp={1:'Start',5:'Deload',6:'Phase 2',10:'Deload',11:'Phase 3',13:'Final Week'};
  let html='<div class="sec-hdr">13-Week Programme</div>',cw=0;
  sched.forEach(s=>{
    if(s.week!==cw){
      if(cw>0)html+='</div>';
      const note=sp[s.week]||'';
      html+='<div class="week-block"><div class="week-hdr">WEEK '+s.week+' <span class="ph-tag ph-'+s.phase+'">Phase '+s.phase+'</span>'+(note?'<span style="font-size:10px;color:var(--muted)">'+note+'</span>':'')+'</div>';
      if(CARDIO_WEEKS.has(s.week))html+='<div style="font-size:10px;color:#c8a000;background:#2a2400;border:1px solid #5a4800;border-radius:8px;padding:6px 10px;margin-bottom:6px;font-family:\'JetBrains Mono\',monospace">&#x1F94A; OPTIONAL CARDIO WEEK</div>';
      cw=s.week;
    }
    const col=COLOURS[s.session],logged=isLogged(s.date),isNow=s.date===t;
    const dm=fmtMed(s.date).split(' ');
    html+='<div class="sched-item '+(isNow?'now':'')+'"><div class="sched-date">'+(dm[0]||'')+'<br>'+(dm[1]||'')+'</div><div class="sched-dot" style="background:'+col+'"></div><div style="flex:1"><div class="sched-name">'+ICONS[s.session]+' '+NAMES[s.session]+'</div><div class="sched-detail">'+(logged?'Completed &#10003;':isNow?'TODAY':'Upcoming')+'</div></div>'+(logged?'<div style="color:var(--legs);font-size:15px">&#10003;</div>':isNow?'<div style="color:var(--accent);font-size:10px;font-weight:700;font-family:\'JetBrains Mono\',monospace;letter-spacing:1px">NOW</div>':'')+'</div>';
  });
  html+='</div>';
  document.getElementById('schedContent').innerHTML=html;
}
function renderProgress(){
  const sched=getSched(),t=todayStr();
  const totalDone=sched.filter(s=>s.date<=t&&isLogged(s.date)).length;
  const pct=Math.round(totalDone/sched.length*100);
  const pbs={};
  Object.keys(D.logs).forEach(key=>{
    if(!key.includes('__'))return;
    const sep=key.indexOf('__');
    const exName=key.slice(sep+2);
    const exLog=D.logs[key];
    let mx=0;
    for(let i=0;i<15;i++){const sv=exLog['s'+i];if(sv&&sv.w&&parseFloat(sv.w)>mx)mx=parseFloat(sv.w);}
    if(mx>0&&(!pbs[exName]||mx>pbs[exName].w))pbs[exName]={w:mx,date:key.slice(0,sep)};
  });
  let html='<div class="sec-hdr">Your Stats</div><div class="stat-grid"><div class="stat-card"><div class="stat-val">'+totalDone+'</div><div class="stat-label">Sessions Done</div></div><div class="stat-card"><div class="stat-val">'+pct+'%</div><div class="stat-label">Complete</div></div><div class="stat-card"><div class="stat-val">'+(sched.length-totalDone)+'</div><div class="stat-label">Remaining</div></div><div class="stat-card"><div class="stat-val">'+Object.keys(pbs).length+'</div><div class="stat-label">PBs Set</div></div></div>';
  if(Object.keys(pbs).length>0){
    html+='<div class="sec-hdr">Personal Bests</div>';
    Object.entries(pbs).sort((a,b)=>b[1].w-a[1].w).forEach(([n,pb])=>{
      html+='<div class="pb-item"><div><div class="pb-name">'+n+'</div><div class="pb-detail">'+fmtShort(pb.date)+'</div></div><div class="pb-val">'+pb.w+getUnit()+'</div></div>';
    });
  }else{
    html+='<div class="empty"><div class="empty-ico">&#x1F4CA;</div><div style="font-size:13px">Log sets with weights to track PBs</div></div>';
  }
  document.getElementById('progContent').innerHTML=html;
}
let tInt=null;
function startTimer(){
  if(!document.getElementById('timerToggle').classList.contains('on'))return;
  stopTimer();
  const ov=document.getElementById('timerOverlay'),num=document.getElementById('timerNum');
  let t=90;num.textContent=t;num.classList.remove('pulsing');
  ov.classList.add('show');
  tInt=setInterval(()=>{t--;num.textContent=t;if(t<=10)num.classList.add('pulsing');if(t<=0)stopTimer();},1000);
}
function stopTimer(){clearInterval(tInt);document.getElementById('timerOverlay').classList.remove('show');document.getElementById('timerNum').classList.remove('pulsing');}
let toastTO;
function showToast(msg){const el=document.getElementById('toast');el.innerHTML=msg;el.classList.add('show');clearTimeout(toastTO);toastTO=setTimeout(()=>el.classList.remove('show'),2500);}
function cycleUnit(){const u=getUnit()==='kg'?'lbs':'kg';if(!D.settings)D.settings={};D.settings.unit=u;saveD();document.getElementById('unitToggle').textContent=u;}
function exportData(){const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='workoutplan_log.json';a.click();}
function resetProgramme(){
  const d=prompt('New start date (YYYY-MM-DD):',todayStr());
  if(d&&/^\d{4}-\d{2}-\d{2}$/.test(d)){D.startDate=d;saveD();document.getElementById('startDateDisplay').textContent=fmtShort(d);showToast('Start date updated');}
}
function resetData(){D=mkDefault();saveD();renderToday();showToast('All data cleared');}
(function(){
  const now=new Date();
  document.getElementById('topDate').innerHTML=now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})+'<br>'+now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('startDateDisplay').textContent=fmtShort(D.startDate);
  document.getElementById('unitToggle').textContent=getUnit();
  renderToday();
})();
</script>
