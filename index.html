  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0a0a0f;--surface:#12121a;--card:#1a1a26;--border:#2a2a3a;--push:#ff6b35;--pull:#4ecdc4;--legs:#a8e063;--cardio:#f7dc6f;--text:#f0f0f8;--muted:#7070a0;--accent:#ff6b35;--safe-top:env(safe-area-inset-top);--safe-bot:env(safe-area-inset-bottom)}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100dvh;overflow-x:hidden}
    .top-bar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,10,15,.92);backdrop-filter:blur(20px);padding:calc(var(--safe-top) + 12px) 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
    .app-logo{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:2px;color:var(--accent)}
    .top-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);text-align:right;line-height:1.4}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,10,15,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bot)}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;cursor:pointer;transition:color .2s}
    .nav-btn.active{color:var(--accent)}
    .nav-btn svg{width:22px;height:22px}
    .page{display:none;padding:100px 16px 100px;min-height:100dvh}
    .page.active{display:block}
    .today-hero{background:linear-gradient(135deg,var(--card) 0%,#1e1e2e 100%);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:16px;position:relative;overflow:hidden}
    .today-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:var(--session-color,var(--accent));opacity:.08}
    .session-badge{display:inline-flex;align-items:center;gap:6px;background:var(--session-color,var(--accent));color:#000;font-family:'Bebas Neue',cursive;font-size:13px;letter-spacing:1px;padding:4px 12px;border-radius:20px;margin-bottom:12px}
    .today-title{font-family:'Bebas Neue',cursive;font-size:42px;letter-spacing:1px;line-height:1;margin-bottom:6px}
    .today-sub{color:var(--muted);font-size:13px}
    .phase-pill{position:absolute;top:20px;right:20px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);border:1px solid var(--border);padding:4px 10px;border-radius:20px}
    .week-progress{display:flex;align-items:center;gap:16px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
    .ring-wrap{position:relative;width:56px;height:56px;flex-shrink:0}
    .ring-wrap svg{transform:rotate(-90deg)}
    .ring-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600}
    .week-info{flex:1}
    .week-info strong{display:block;font-size:14px;margin-bottom:2px}
    .week-info span{font-size:12px;color:var(--muted)}
    .section-title{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:1px;color:var(--muted);margin:20px 0 10px}
    .exercise-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s,transform .1s}
    .exercise-card:active{transform:scale(.98)}
    .exercise-card.logged{border-color:var(--session-color,var(--accent))}
    .ex-row{display:flex;align-items:center;justify-content:space-between}
    .ex-name{font-weight:600;font-size:15px}
    .ex-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:3px}
    .ex-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
    .sets-grid{display:none;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:12px}
    .exercise-card.open .sets-grid{display:grid}
    .set-input-wrap{display:flex;flex-direction:column;gap:3px}
    .set-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);text-align:center}
    .set-input{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;text-align:center;padding:8px 4px;width:100%}
    .set-input:focus{outline:none;border-color:var(--session-color,var(--accent))}
    .log-btn{margin-top:10px;width:100%;background:var(--session-color,var(--accent));color:#000;border:none;border-radius:10px;padding:10px;font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:1px;cursor:pointer}
    .log-btn:active{opacity:.8}
    .start-btn{width:100%;background:var(--session-color,var(--accent));color:#000;border:none;border-radius:14px;padding:16px;font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:2px;cursor:pointer;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
    .start-btn:active{opacity:.85}
    .week-block{margin-bottom:24px}
    .week-header{font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:2px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:10px}
    .phase-tag{font-size:10px;font-family:'DM Sans',sans-serif;padding:2px 8px;border-radius:10px;font-weight:600}
    .phase-1{background:#ff6b3520;color:var(--push)}
    .phase-2{background:#4ecdc420;color:var(--pull)}
    .phase-3{background:#a8e06320;color:var(--legs)}
    .sched-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px}
    .sched-card.today-hl{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
    .sched-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);min-width:44px;text-align:center;line-height:1.4}
    .sched-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .sched-info{flex:1}
    .sched-name{font-weight:600;font-size:14px}
    .sched-detail{font-size:12px;color:var(--muted);margin-top:2px}
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
    .stat-val{font-family:'Bebas Neue',cursive;font-size:36px;color:var(--accent)}
    .stat-label{font-size:11px;color:var(--muted);margin-top:2px}
    .pb-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
    .pb-name{font-weight:600;font-size:14px}
    .pb-val{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent)}
    .pb-date{font-size:11px;color:var(--muted);margin-top:2px}
    .settings-section{margin-bottom:24px}
    .settings-label{font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:1px;color:var(--muted);margin-bottom:10px;display:block}
    .settings-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
    .settings-row{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border)}
    .settings-row:last-child{border-bottom:none}
    .settings-row-val{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--muted)}
    .toggle{width:44px;height:26px;background:var(--border);border-radius:13px;position:relative;cursor:pointer;transition:background .2s}
    .toggle.on{background:var(--accent)}
    .toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;background:white;border-radius:50%;transition:transform .2s}
    .toggle.on::after{transform:translateX(18px)}
    .timer-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);backdrop-filter:blur(10px);flex-direction:column;align-items:center;justify-content:center}
    .timer-overlay.show{display:flex}
    .timer-ring{font-family:'Bebas Neue',cursive;font-size:96px;color:var(--accent);line-height:1}
    .timer-label{color:var(--muted);font-size:14px;margin-top:8px;margin-bottom:32px}
    .timer-close{background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px 32px;border-radius:12px;font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:1px;cursor:pointer}
    .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 20px;font-size:13px;opacity:0;transition:all .3s;z-index:300;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .empty{text-align:center;padding:40px 20px;color:var(--muted)}
    .empty-icon{font-size:48px;margin-bottom:12px}
    .cardio-banner{background:linear-gradient(135deg,#7d6608,#3d3308);border:1px solid var(--cardio);border-radius:12px;padding:12px 16px;margin-bottom:10px;display:flex;align-items:center;gap:10px;font-size:13px}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .pulsing{animation:pulse 1.5s infinite}
  </style>
</head>
<body>
<div class="top-bar">
  <div class="app-logo">WorkoutPlan</div>
  <div class="top-date" id="topDate"></div>
</div>
<div class="page active" id="page-today"><div id="todayContent"></div></div>

<div class="page" id="page-progress"><div id="progressContent"></div></div>
<div class="page" id="page-settings">

      <div class="settings-row"><span>Start Date</span><span class="settings-row-val">7 Mar 2025</span></div>

      <div class="settings-row"><span>Goal</span><span class="settings-row-val">Muscle + Definition</span></div>
    </div>
  </div>

    <span class="settings-label">Preferences</span>

      <div class="settings-row"><span>Rest Timer (90s)</span><div class="toggle on" id="timerToggle" onclick="this.classList.toggle('on')"></div></div>
      <div class="settings-row"><span>Weight Unit</span><span class="settings-row-val" id="unitToggle" onclick="toggleUnit()" style="cursor:pointer;color:var(--accent)">kg</span></div>
    </div>
  </div>
  <div class="settings-section">
    <span class="settings-label">Data</span>
    <div class="settings-card">
      <div class="settings-row" onclick="exportData()" style="cursor:pointer"><span>Export Log (JSON)</span><span class="settings-row-val">→</span></div>
      <div class="settings-row" onclick="if(confirm('Reset ALL data?'))resetData()" style="cursor:pointer"><span style="color:#ff4444">Reset All Data</span><span class="settings-row-val">→</span></div>
    </div>
  </div>
  <div style="text-align:center;margin-top:32px;color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace">WorkoutPlan v1.0 · andrewingram32 · Mar–Jun 2025</div>
</div>

  </button>
  <button class="nav-btn" onclick="showPage('settings',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    Settings
  </button>
</div>
<div class="timer-overlay" id="timerOverlay">
  <div style="color:var(--muted);font-size:14px;margin-bottom:8px;font-family:'JetBrains Mono',monospace">REST</div>
  <div class="timer-ring" id="timerCount">90</div>
  <div class="timer-label">seconds remaining</div>
  <button class="timer-close" onclick="stopTimer()">SKIP REST</button>
</div>
<div class="toast" id="toast"></div>
<script>
const SESSION_COLORS={A:'#ff6b35',B:'#4ecdc4',C:'#a8e063'};
const SESSION_NAMES={A:'Push Day',B:'Pull Day',C:'Legs + Core'};
const SESSION_ICONS={A:'💪',B:'🏋️',C:'🦵'};
const CARDIO_WEEKS=new Set([3,5,7,9,11,13]);
const PROGRAMME_END=new Date('2025-06-07');
function generateSchedule(){
  const days=[];
  [{'date':'2025-03-07','week':1,'session':'A'},{'date':'2025-03-10','week':1,'session':'B'},{'date':'2025-03-12','week':1,'session':'C'}].forEach(d=>days.push(d));
  const cycle=['A','B','C'];
  for(let wk=2;wk<=13;wk++){
    const mon=new Date('2025-03-10');mon.setDate(mon.getDate()+(wk-1)*7);
    [0,2,4].forEach((off,i)=>{const d=new Date(mon);d.setDate(d.getDate()+off);if(d<=PROGRAMME_END)days.push({date:d.toISOString().split('T')[0],week:wk,session:cycle[i]});});
  }
  return days;
}
const SCHEDULE=generateSchedule();
const EX={
  A:{
    1:[{name:'Barbell Bench Press',sets:3,reps:'10-12',cue:'Retract scapula, full ROM'},{name:'Overhead Press',sets:3,reps:'10-12',cue:'Core braced, elbows 45°'},{name:'Incline DB Press',sets:3,reps:'12',cue:'30-45° incline'},{name:'Lateral Raises',sets:3,reps:'12',cue:'Lead with elbow'},{name:'Tricep Pushdown',sets:3,reps:'12',cue:'Elbows tucked, full ext'},{name:'Skull Crushers',sets:3,reps:'12',cue:'Keep elbows fixed'}],
    2:[{name:'Barbell Bench Press',sets:4,reps:'8-10',cue:'Retract scapula, full ROM'},{name:'Overhead Press',sets:4,reps:'8-10',cue:'Core braced, elbows 45°'},{name:'Incline DB Press',sets:4,reps:'10',cue:'30-45° incline'},{name:'Lateral Raises',sets:4,reps:'12',cue:'Lead with elbow'},{name:'Cable Fly',sets:4,reps:'12',cue:'Squeeze at peak'},{name:'Tricep Pushdown',sets:4,reps:'12',cue:'Elbows tucked'},{name:'Dips',sets:3,reps:'10',cue:'Lean forward for chest'}],
    3:[{name:'Barbell Bench Press',sets:4,reps:'12',cue:'Retract scapula, full ROM'},{name:'Incline DB Press',sets:4,reps:'12',cue:'30-45° incline'},{name:'Overhead Press',sets:4,reps:'12',cue:'Core braced'},{name:'Cable Fly',sets:4,reps:'15',cue:'Slow eccentric'},{name:'Lateral Raises',sets:4,reps:'15',cue:'Lead with elbow'},{name:'Tricep Pushdown',sets:4,reps:'15',cue:'Full extension'},{name:'Dips',sets:4,reps:'12',cue:'Control descent'}],
  },
  B:{
    1:[{name:'Lat Pulldown',sets:3,reps:'10-12',cue:'Drive elbows to hips'},{name:'Barbell Row',sets:3,reps:'10-12',cue:'Pull to lower rib'},{name:'Seated Cable Row',sets:3,reps:'12',cue:'Squeeze shoulder blades'},{name:'Face Pulls',sets:3,reps:'15',cue:'Pull to forehead, ext rotate'},{name:'Barbell Curl',sets:3,reps:'10',cue:'No swinging'},{name:'Hammer Curl',sets:3,reps:'12',cue:'Neutral grip'}],
    2:[{name:'Pull-ups / Lat Pulldown',sets:4,reps:'8-10',cue:'Full hang, drive elbows'},{name:'Barbell Row',sets:4,reps:'8-10',cue:'Pull to lower rib'},{name:'Seated Cable Row',sets:4,reps:'10',cue:'Squeeze blades, no shrug'},{name:'Face Pulls',sets:4,reps:'15',cue:'External rotate at end'},{name:'Reverse Fly',sets:4,reps:'12',cue:'Lead with elbows'},{name:'Barbell Curl',sets:4,reps:'10',cue:'Full extension at bottom'},{name:'Incline DB Curl',sets:3,reps:'12',cue:'Full stretch at bottom'}],
    3:[{name:'Pull-ups',sets:4,reps:'12',cue:'Full hang, chin over bar'},{name:'Barbell Row',sets:4,reps:'12',cue:'Pull to lower rib'},{name:'Seated Cable Row',sets:4,reps:'12',cue:'Constant tension'},{name:'Face Pulls',sets:4,reps:'15',cue:'External rotate at end'},{name:'Reverse Fly',sets:4,reps:'15',cue:'Lead with elbows'},{name:'Barbell Curl',sets:4,reps:'12',cue:'Squeeze at peak'},{name:'Cable Curl',sets:4,reps:'15',cue:'Constant tension'}],
  },
  C:{
    1:[{name:'Barbell Squat',sets:3,reps:'10-12',cue:'Depth parallel+, knees track'},{name:'Romanian DL',sets:3,reps:'10-12',cue:'Hinge hip, soft knee'},{name:'Leg Press',sets:3,reps:'12',cue:'Foot position varies'},{name:'Walking Lunges',sets:3,reps:'12ea',cue:'Torso upright'},{name:'Leg Curl',sets:3,reps:'12',cue:"Don't let hips lift"},{name:'Calf Raise',sets:3,reps:'15',cue:'Pause at bottom'},{name:'Plank',sets:3,reps:'45s',cue:'Neutral spine, glutes engaged'}],
    2:[{name:'Barbell Squat',sets:4,reps:'8-10',cue:'Depth parallel+'},{name:'Romanian DL',sets:4,reps:'8-10',cue:'Hinge hip, feel hamstring'},{name:'Leg Press',sets:4,reps:'10',cue:'Slow eccentric'},{name:'Leg Extension',sets:4,reps:'12',cue:'Squeeze at top'},{name:'Leg Curl',sets:4,reps:'12',cue:'Full contraction'},{name:'Walking Lunges',sets:4,reps:'12ea',cue:'Step through heel'},{name:'Calf Raise',sets:4,reps:'15',cue:'Pause at bottom'},{name:'Cable Crunch',sets:4,reps:'15',cue:'Crunch from abs'}],
    3:[{name:'Barbell Squat',sets:4,reps:'10',cue:'Full depth, knees track'},{name:'Romanian DL',sets:4,reps:'10',cue:'Feel hamstring stretch'},{name:'Leg Press',sets:4,reps:'12',cue:'Drop set on final set'},{name:'Leg Extension',sets:4,reps:'15',cue:'Squeeze at top'},{name:'Leg Curl',sets:4,reps:'15',cue:'Full contraction'},{name:'Walking Lunges',sets:4,reps:'15ea',cue:'Step through heel'},{name:'Calf Raise',sets:4,reps:'20',cue:'Pause at bottom'},{name:'Cable Crunch',sets:4,reps:'20',cue:'Crunch from abs'},{name:'Hanging Leg Raise',sets:4,reps:'15',cue:'Tuck pelvis at top'}],
  },
};
function phase(w){return w<=4?1:w<=9?2:3;}
function today(){return new Date().toISOString().split('T')[0];}
function fmtDate(s){return new Date(s+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});}
const SK='workoutplan_v1';
function load(){try{return JSON.parse(localStorage.getItem(SK))||{logs:{},settings:{unit:'kg'}};}catch{return{logs:{},settings:{unit:'kg'}};}}
function save(d){localStorage.setItem(SK,JSON.stringify(d));}
let D=load();
function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='today')renderToday();
  if(name==='schedule')renderSchedule();
  if(name==='progress')renderProgress();
}
function todaySess(){return SCHEDULE.find(s=>s.date===today());}
function nextSess(){return SCHEDULE.find(s=>s.date>today());}
function progress(){
  const done=SCHEDULE.filter(s=>s.date<=today()&&D.logs[s.date]&&Object.keys(D.logs[s.date].exercises||{}).length>0).length;
  return{done,total:SCHEDULE.length,pct:Math.round(done/SCHEDULE.length*100)};
}
function renderToday(){
  const t=today(),sess=todaySess(),next=!sess?nextSess():null,prog=progress();
  let html='';
  if(sess){
    const ph=phase(sess.week),col=SESSION_COLORS[sess.session],dl=[5,10].includes(sess.week);
    html+=`<div class="today-hero" style="--session-color:${col}"><div class="session-badge">${SESSION_ICONS[sess.session]} ${SESSION_NAMES[sess.session]}</div><div class="today-title">${SESSION_NAMES[sess.session].toUpperCase()}</div><div class="today-sub">${fmtDate(t)} · Phase ${ph} · Week ${sess.week}</div><div class="phase-pill">P${ph} W${sess.week}</div>${ring(prog,col)}</div>`;
    if(CARDIO_WEEKS.has(sess.week))html+=`<div class="cardio-banner">🥊 <span><strong>Optional cardio this week</strong> — Boxing / Move class / HIIT</span></div>`;
    if(dl)html+=`<div style="background:#1a1a26;border:1px solid #2a2a3a;border-radius:12px;padding:14px;margin-bottom:12px;font-size:13px;color:#a0a0c0">🔄 <strong>Deload week</strong> — Reduce weights ~40%</div>`;
    html+=`<button class="start-btn" style="--session-color:${col}" onclick="startW('${t}')">▶ START WORKOUT</button>`;
    html+=`<div class="section-title">Today's Exercises</div>`;
    (EX[sess.session][ph]||[]).forEach((ex,i)=>{html+=exCard(ex,i,t,col,sess.session,dl);});
  }else if(next){
    html+=`<div class="today-hero"><div class="session-badge">😴 Rest Day</div><div class="today-title">REST &amp; RECOVER</div><div class="today-sub">${fmtDate(t)}</div>${ring(prog,'#555570')}</div><div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-top:12px"><div style="color:var(--muted);font-size:12px;margin-bottom:6px;font-family:'JetBrains Mono',monospace">NEXT SESSION</div><div style="font-weight:600;font-size:16px">${SESSION_ICONS[next.session]} ${SESSION_NAMES[next.session]}</div><div style="color:var(--muted);font-size:13px;margin-top:4px">${fmtDate(next.date)} · Week ${next.week}</div></div>`;
  }else{html=`<div class="empty"><div class="empty-icon">🏆</div><div>Programme complete! Amazing work.</div></div>`;}
  document.getElementById('todayContent').innerHTML=html;
}
function ring(prog,col){
  const r=22,c=2*Math.PI*r,d=(prog.pct/100)*c;
  return `<div class="week-progress"><div class="ring-wrap"><svg width="56" height="56" viewBox="0 0 56 56"><circle cx="28" cy="28" r="${r}" fill="none" stroke="var(--border)" stroke-width="4"/><circle cx="28" cy="28" r="${r}" fill="none" stroke="${col}" stroke-width="4" stroke-dasharray="${d} ${c}" stroke-linecap="round"/></svg><div class="ring-center" style="color:${col}">${prog.pct}%</div></div><div class="week-info"><strong>${prog.done} of ${prog.total} sessions</strong><span>${prog.total-prog.done} remaining</span></div></div>`;
}
function exCard(ex,i,dateStr,col,sess,dl){
  const sets=dl?Math.max(2,ex.sets-1):ex.sets;
  const logged=D.logs[dateStr]?.exercises?.[ex.name]?.done;
  const inputs=Array.from({length:sets},(_,j)=>`<div class="set-input-wrap"><div class="set-label">Set ${j+1}</div><input class="set-input" type="text" inputmode="decimal" placeholder="kg×reps" value="${getSet(dateStr,ex.name,j)}" onchange="saveSet('${dateStr}','${ex.name}',${j},this.value,'${sess}')"></div>`).join('');
  return `<div class="exercise-card ${logged?'logged':''}" id="ec${i}" style="--session-color:${col}"><div class="ex-row" onclick="toggleEC(${i})"><div><div class="ex-name">${ex.name}</div><div class="ex-meta">${sets} sets · ${ex.reps} · ${ex.cue}</div></div><div class="ex-check" id="eck${i}" style="${logged?`background:${col};border-color:${col};color:#000`:''}">${logged?'✓':''}</div></div><div class="sets-grid">${inputs}<div class="set-input-wrap" style="align-self:end"><button class="log-btn" onclick="markDone('${dateStr}','${ex.name}',${i},'${col}')">DONE</button></div></div></div>`;
}
function getSet(d,n,i){const s=D.logs[d]?.exercises?.[n]?.[i];return s?`${s.w}×${s.r}`:'';
}
function toggleEC(i){document.getElementById('ec'+i).classList.toggle('open');}
function saveSet(d,n,i,v,sess){
  if(!D.logs[d])D.logs[d]={session:sess,exercises:{}};
  if(!D.logs[d].exercises[n])D.logs[d].exercises[n]={};
  const p=v.split('×');D.logs[d].exercises[n][i]={w:p[0]||'',r:p[1]||''};save(D);
}
function markDone(d,n,i,col){
  if(!D.logs[d])D.logs[d]={exercises:{}};
  if(!D.logs[d].exercises[n])D.logs[d].exercises[n]={};
  D.logs[d].exercises[n].done=true;save(D);
  const card=document.getElementById('ec'+i);card.classList.add('logged');card.classList.remove('open');
  const ck=document.getElementById('eck'+i);
  if(ck){ck.style.cssText=`background:${col};border-color:${col};color:#000`;ck.textContent='✓';}
  toast('✓ '+n+' logged');startTimer();
}
function startW(d){toast('Workout started! 💪');const f=document.getElementById('ec0');if(f){f.classList.add('open');f.scrollIntoView({behavior:'smooth',block:'center'});}}
function renderSchedule(){
  const t=today(),sp={1:'Start here ✅',5:'Deload 🔄',6:'Phase 2 🚀',10:'Deload 🔄',11:'Phase 3 🔥',13:'Final Week 🏆'};
  let html='<div class="section-title">Full Programme</div>',cw=0;
  SCHEDULE.forEach(s=>{
    if(s.week!==cw){
      if(cw>0)html+='</div>';
      const ph=phase(s.week),note=sp[s.week]||'';
      html+=`<div class="week-block"><div class="week-header">WEEK ${s.week} <span class="phase-tag phase-${ph}">Phase ${ph}</span>${note?`<span style="font-size:10px;color:var(--muted)">${note}</span>`:''}</div>`;
      if(CARDIO_WEEKS.has(s.week))html+=`<div style="font-size:11px;color:#c8a000;background:#2a2400;border:1px solid #5a4800;border-radius:8px;padding:6px 10px;margin-bottom:8px">🥊 Optional cardio week</div>`;
      cw=s.week;
    }
    const col=SESSION_COLORS[s.session],done=D.logs[s.date]&&Object.keys(D.logs[s.date].exercises||{}).length>0,isT=s.date===t;
    html+=`<div class="sched-card ${isT?'today-hl':''}"><div class="sched-date">${fmtDate(s.date).replace(',','<br>')}</div><div class="sched-dot" style="background:${col}"></div><div class="sched-info"><div class="sched-name">${SESSION_ICONS[s.session]} ${SESSION_NAMES[s.session]}</div><div class="sched-detail">Phase ${phase(s.week)} · ${done?'Completed ✓':isT?'Today':'Upcoming'}</div></div>${done?'<div style="color:var(--legs);font-size:16px">✓</div>':isT?'<div style="color:var(--accent);font-size:12px;font-weight:600">NOW</div>':''}</div>`;
  });
  html+='</div>';
  document.getElementById('scheduleContent').innerHTML=html;
}
function renderProgress(){
  const prog=progress(),ts=Object.keys(D.logs).filter(d=>Object.keys(D.logs[d].exercises||{}).length>0).length,pbs={};
  Object.entries(D.logs).forEach(([d,log])=>{Object.entries(log.exercises||{}).forEach(([n,sets])=>{const mx=Math.max(...Object.values(sets).filter(s=>s&&s.w).map(s=>parseFloat(s.w)||0));if(mx>0&&(!pbs[n]||mx>pbs[n].w))pbs[n]={w:mx,d};});});
  let html=`<div class="section-title">Your Stats</div><div class="stat-grid"><div class="stat-card"><div class="stat-val">${ts}</div><div class="stat-label">Sessions Logged</div></div><div class="stat-card"><div class="stat-val">${prog.pct}%</div><div class="stat-label">Programme Done</div></div><div class="stat-card"><div class="stat-val">${prog.done}</div><div class="stat-label">Workouts Done</div></div><div class="stat-card"><div class="stat-val">${Object.keys(pbs).length}</div><div class="stat-label">Personal Bests</div></div></div>`;
  if(Object.keys(pbs).length>0){html+=`<div class="section-title">Personal Bests</div>`;Object.entries(pbs).sort((a,b)=>b[1].w-a[1].w).forEach(([n,pb])=>{html+=`<div class="pb-card"><div><div class="pb-name">${n}</div><div class="pb-date">${fmtDate(pb.d)}</div></div><div class="pb-val">${pb.w}${D.settings?.unit||'kg'}</div></div>`;});}
  else{html+=`<div class="empty"><div class="empty-icon">📊</div><div>Log workouts to see personal bests</div></div>`;}
  document.getElementById('progressContent').innerHTML=html;
}
let tInterval=null;
function startTimer(){
  if(!document.getElementById('timerToggle').classList.contains('on'))return;
  const ov=document.getElementById('timerOverlay'),cnt=document.getElementById('timerCount');
  ov.classList.add('show');let t=90;cnt.textContent=t;clearInterval(tInterval);
  tInterval=setInterval(()=>{t--;cnt.textContent=t;if(t<=0)stopTimer();if(t<=10)cnt.classList.add('pulsing');},1000);
}
function stopTimer(){clearInterval(tInterval);document.getElementById('timerOverlay').classList.remove('show');document.getElementById('timerCount').classList.remove('pulsing');}
let toastTO;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTO);toastTO=setTimeout(()=>el.classList.remove('show'),2500);}
function toggleUnit(){const el=document.getElementById('unitToggle'),next=(D.settings?.unit||'kg')==='kg'?'lbs':'kg';if(!D.settings)D.settings={};D.settings.unit=next;save(D);el.textContent=next;}
function exportData(){const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='workoutplan_export.json';a.click();}
function resetData(){D={logs:{},settings:{unit:'kg'}};save(D);renderToday();toast('Data reset');}
if('serviceWorker' in navigator){const sw=`const C='wp1';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.add('/')).then(()=>self.skipWaiting()));});self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim());});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});`;const b=new Blob([sw],{type:'application/javascript'});navigator.serviceWorker.register(URL.createObjectURL(b)).catch(()=>{});}
const mf=document.createElement('link');mf.rel='manifest';mf.href=URL.createObjectURL(new Blob([JSON.stringify({name:'WorkoutPlan',short_name:'WorkoutPlan',display:'standalone',background_color:'#0a0a0f',theme_color:'#0a0a0f',start_url:'/'})],{type:'application/manifest+json'}));document.head.appendChild(mf);
(function(){const d=new Date();document.getElementById('topDate').innerHTML=d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})+'<br>'+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});renderToday();})();
</script>
